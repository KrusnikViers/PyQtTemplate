name: Build Binaries

on:
  push:

env:
  PYTHON_VERSION: &PYTHON_VERSION '3.14'

jobs:
  define-version:
    runs-on: ubuntu-latest
    name: Versioning
    outputs:
      project_version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Calculate version
        id: get_version
        run: echo VERSION=0.0a >> "$GITHUB_OUTPUT"
        # Retrieval: ${{ needs.define-version.outputs.project_version }}

  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux binary
    needs: define-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Project
        uses: ./.github/actions/setup_project
        with:
          python-version: *PYTHON_VERSION
      - name: Setup Linux
        uses: ./.github/actions/setup_linux
      - name: Create Executable
        uses: sayyid5416/pyinstaller@31a3d88828ae07b9658ecef15818d006b7333d8a
        with:
          python_ver: *PYTHON_VERSION
          spec: 'build_tools/pyinstaller/binary.spec'
          clean_checkout: false
          requirements: 'requirements.txt'
          upload_exe_with_name: 'PyQtTemplate Linux Binary'

  build-windows:
    runs-on: windows-latest
    name: Build Windows binary
    needs: define-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Project
        uses: ./.github/actions/setup_project
        with:
          python-version: *PYTHON_VERSION
      - name: Create Executable
        uses: sayyid5416/pyinstaller@31a3d88828ae07b9658ecef15818d006b7333d8a
        with:
          python_ver: *PYTHON_VERSION
          spec: 'build_tools/pyinstaller/binary.spec'
          clean_checkout: false
          requirements: 'requirements.txt'
          upload_exe_with_name: 'PyQtTemplate Windows Binary'
