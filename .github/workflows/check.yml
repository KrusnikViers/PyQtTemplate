name: Check
permissions: { }
on:
  push:
  schedule:
    - cron: '0 9 * * 1,4'
env:
  PYTHON_VERSION: '3.14'


jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Project
        uses: ./.github/actions/setup_project
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Flake8
        run: pip install flake8

      - name: flake8 Lint
        uses: py-actions/flake8@84ec6726560b6d5bd68f2a5bed83d62b52bb50ba
        with:
          max-line-length: "121"
          exclude: "__init__.py,*_uic.py"

  tests:
    runs-on: ubuntu-latest
    name: Tests
    strategy:
      matrix:
        python-version: [ '3.14' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Project
        uses: ./.github/actions/setup_project
        with:
          python-version: '${{ matrix.python-version }}'
      - name: Install test utils
        run: pip install pytest
      - name: Setup Linux
        uses: ./.github/actions/setup_linux

      - name: Discover and run tests
        run: xvfb-run python -m unittest discover -p '*_test.py'

  coverage:
    runs-on: ubuntu-latest
    name: Coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Project
        uses: ./.github/actions/setup_project
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Coverage utils
        run: pip install pytest coverage
      - name: Setup Linux
        uses: ./.github/actions/setup_linux

      - name: Test and gather coverage data
        run: xvfb-run coverage run -m unittest discover -p '*_test.py'
      - name: Upload coverage data
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
